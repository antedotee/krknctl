name: Notify Docs Sync

# When a PR merges on this fork's docs-sync-test branch (or main, eventually),
# fire a `repository_dispatch` event to antedotee/krkn-website so its
# docs-sync orchestrator can decide whether to open a docs PR.
#
# Thin trigger — NO logic, NO LLM calls. All decision-making happens on
# the website side after dispatch.

permissions:
  contents: read
  pull-requests: read

on:
  # Manual dispatch only. The PR-merge → dispatch path lives in
  # build-upstream-digest.yml so the dispatch fires AFTER digest regen.
  # Kept here as a break-glass entry point for replaying a PR by hand.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to simulate'
        required: true
      head_sha:
        description: 'Head SHA'
        required: true
      base_sha:
        description: 'Base SHA'
        required: true

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to website
        env:
          DISPATCH_PAT: ${{ secrets.WEBSITE_DISPATCH_PAT }}
          UPSTREAM_REPO: ${{ github.repository }}
          PR_NUMBER: >-
            ${{ github.event_name == 'workflow_dispatch'
                && github.event.inputs.pr_number
                || github.event.pull_request.number }}
          HEAD_SHA: >-
            ${{ github.event_name == 'workflow_dispatch'
                && github.event.inputs.head_sha
                || github.event.pull_request.merge_commit_sha }}
          BASE_SHA: >-
            ${{ github.event_name == 'workflow_dispatch'
                && github.event.inputs.base_sha
                || github.event.pull_request.base.sha }}
        run: |
          set -e
          echo "Dispatching docs-sync for ${UPSTREAM_REPO}#${PR_NUMBER}"
          for var in UPSTREAM_REPO PR_NUMBER HEAD_SHA BASE_SHA; do
            if [ -z "${!var}" ]; then
              echo "::error::missing required field: ${var}"
              exit 1
            fi
          done

          curl -sS -X POST \
            -H "Authorization: token ${DISPATCH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/antedotee/krkn-website/dispatches" \
            -d "$(cat <<EOF
          {
            "event_type": "docs-sync",
            "client_payload": {
              "upstream_repo": "${UPSTREAM_REPO}",
              "pr_number":     ${PR_NUMBER},
              "head_sha":      "${HEAD_SHA}",
              "base_sha":      "${BASE_SHA}"
            }
          }
          EOF
          )"

          echo '::notice::repository_dispatch sent successfully'
