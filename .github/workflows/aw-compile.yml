name: Compile gh-aw workflows

# Auto-compiles every *.md file in .github/workflows/ into its *.lock.yml
# sibling and commits the result back. Contributors only edit the .md file.
#
# Skips itself on commits authored by github-actions[bot] (via the
# [skip-aw-compile] tag) to prevent infinite loops.

on:
  push:
    paths:
      - '.github/workflows/*.md'

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-aw-compile]')"
    steps:
      - uses: actions/checkout@v5
        with:
          # Default GITHUB_TOKEN cannot push to .github/workflows/* (it lacks the
          # `workflows` permission). Use a PAT scoped to this repo with
          # Contents:R/W + Workflows:R/W instead.
          token: ${{ secrets.GH_AW_COMPILE_PAT }}

      - name: Install gh-aw extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-aw

      - name: Compile every workflow markdown
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          for f in .github/workflows/*.md; do
            echo "::group::Compiling $f"
            gh aw compile "$f"
            echo "::endgroup::"
          done

      - name: Commit lock files if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/
          if git diff --staged --quiet; then
            echo '::notice::No compiled-output changes.'
            exit 0
          fi
          git commit -m "chore: auto-compile gh-aw workflows [skip-aw-compile]"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
