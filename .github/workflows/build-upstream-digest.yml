name: Build Upstream Digest

# Regenerates .docs-sync-digest/ for krknctl on every change to the
# cobra CLI source. The output is consumed by docs-sync's relevance
# gate in the website fork — when an upstream PR merges, the website
# pipeline reads .docs-sync-digest/llms-full.txt at the head and base
# refs to detect what user-facing CLI surface changed.
#
# Build flow:
#   1. Set up Go toolchain
#   2. Build the krknctl binary
#   3. Run the Python digest builder, shelling out to the binary's
#      `--help` output for each subcommand
#   4. Commit the regenerated digest back to the branch if it changed

permissions:
  contents: write

on:
  push:
    branches: [main, docs-sync-test]
    paths:
      # Cobra source — any change here may shift the help output.
      - 'cmd/**/*.go'
      # Build deps that could embed version metadata in help text.
      - 'go.mod'
      - 'go.sum'
      - '.docs-sync/**'
      - '.github/workflows/build-upstream-digest.yml'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild'
        required: false
        default: 'Manual trigger'

concurrency:
  group: build-upstream-digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to the go.mod-declared version so help-output formatting
          # stays stable run-to-run.
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # krknctl pulls in github.com/containers/storage and github.com/proglottis/gpgme
      # via its container-runtime providers. Default `go build` then needs:
      #   - libbtrfs-dev (btrfs storage driver C headers)
      #   - libgpgme-dev (GPG signature checking)
      # Mirror the recipe from krknctl's own release pipeline (.github/workflows/
      # build.yaml): install libbtrfs-dev, set CGO_ENABLED=0, and use the
      # `containers_image_openpgp` build tag so the OpenPGP code path is the
      # Go-native one (no system gpgme required).
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libbtrfs-dev

      - name: Build krknctl binary
        env:
          CGO_ENABLED: "0"
        run: |
          go build -tags containers_image_openpgp -ldflags="-w -s" -o /tmp/krknctl .
          /tmp/krknctl --version || true

      - name: Build upstream digest
        run: |
          python .docs-sync/build_upstream_digest.py \
            --repo-name krknctl \
            --binary /tmp/krknctl

      - name: Commit digest back if changed
        id: commit_digest
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .docs-sync-digest/
          if git diff --staged --quiet; then
            echo '::notice::Digest unchanged — no commit needed.'
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore(docs-sync): regenerate upstream digest

          Auto-regenerated by .github/workflows/build-upstream-digest.yml after
          changes to the cobra CLI source. Source commit: ${GITHUB_SHA::7}."
          git push origin HEAD:${GITHUB_REF#refs/heads/}
          echo '::notice::Digest committed.'
          echo "committed=true" >> $GITHUB_OUTPUT
          echo "new_head=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Look up originating PR
        if: |
          steps.commit_digest.outputs.committed == 'true'
          && github.event_name == 'push'
        id: find_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          PR_NUMBER=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' 2>/dev/null)
          echo "pr_number=${PR_NUMBER:-0}" >> $GITHUB_OUTPUT
          if [ -n "$PR_NUMBER" ]; then
            echo "::notice::Inferred PR #${PR_NUMBER} for source commit ${{ github.sha }}"
          else
            echo "::notice::No PR found for this push — direct push to branch. Skipping dispatch."
          fi

      - name: Dispatch to docs-sync website
        if: |
          steps.commit_digest.outputs.committed == 'true'
          && github.event_name == 'push'
          && steps.find_pr.outputs.pr_number != '0'
        env:
          DISPATCH_PAT: ${{ secrets.WEBSITE_DISPATCH_PAT }}
          UPSTREAM_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          HEAD_SHA: ${{ steps.commit_digest.outputs.new_head }}
          BASE_SHA: ${{ github.event.before }}
        run: |
          set -e
          echo "Dispatching docs-sync for ${UPSTREAM_REPO}#${PR_NUMBER}"
          echo "  head_sha=${HEAD_SHA} (post digest-regen)"
          echo "  base_sha=${BASE_SHA} (pre source push)"

          curl -sS -X POST \
            -H "Authorization: token ${DISPATCH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/antedotee/krkn-website/dispatches" \
            -d "$(cat <<EOF
          {
            "event_type": "docs-sync",
            "client_payload": {
              "upstream_repo": "${UPSTREAM_REPO}",
              "pr_number":     ${PR_NUMBER},
              "head_sha":      "${HEAD_SHA}",
              "base_sha":      "${BASE_SHA}"
            }
          }
          EOF
          )"
          echo '::notice::repository_dispatch sent to docs-sync after digest regen'
