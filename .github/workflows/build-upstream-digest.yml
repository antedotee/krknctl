name: Build Upstream Digest

# Regenerates .docs-sync-digest/ for krknctl on every change to the
# cobra CLI source. The output is consumed by docs-sync's relevance
# gate in the website fork — when an upstream PR merges, the website
# pipeline reads .docs-sync-digest/llms-full.txt at the head and base
# refs to detect what user-facing CLI surface changed.
#
# Build flow:
#   1. Set up Go toolchain
#   2. Build the krknctl binary
#   3. Run the Python digest builder, shelling out to the binary's
#      `--help` output for each subcommand
#   4. Commit the regenerated digest back to the branch if it changed

permissions:
  contents: write

on:
  push:
    branches: [main, docs-sync-test]
    paths:
      # Cobra source — any change here may shift the help output.
      - 'cmd/**/*.go'
      # Build deps that could embed version metadata in help text.
      - 'go.mod'
      - 'go.sum'
      - '.docs-sync/**'
      - '.github/workflows/build-upstream-digest.yml'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild'
        required: false
        default: 'Manual trigger'

concurrency:
  group: build-upstream-digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to the go.mod-declared version so help-output formatting
          # stays stable run-to-run.
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # krknctl pulls in github.com/containers/storage and github.com/proglottis/gpgme
      # via its container-runtime providers. Default `go build` then needs:
      #   - libbtrfs-dev (btrfs storage driver C headers)
      #   - libgpgme-dev (GPG signature checking)
      # Mirror the recipe from krknctl's own release pipeline (.github/workflows/
      # build.yaml): install libbtrfs-dev, set CGO_ENABLED=0, and use the
      # `containers_image_openpgp` build tag so the OpenPGP code path is the
      # Go-native one (no system gpgme required).
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libbtrfs-dev

      - name: Build krknctl binary
        env:
          CGO_ENABLED: "0"
        run: |
          go build -tags containers_image_openpgp -ldflags="-w -s" -o /tmp/krknctl .
          /tmp/krknctl --version || true

      - name: Build upstream digest
        run: |
          python .docs-sync/build_upstream_digest.py \
            --repo-name krknctl \
            --binary /tmp/krknctl

      - name: Commit digest back if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .docs-sync-digest/
          if git diff --staged --quiet; then
            echo '::notice::Digest unchanged — no commit needed.'
            exit 0
          fi
          git commit -m "chore(docs-sync): regenerate upstream digest

          Auto-regenerated by .github/workflows/build-upstream-digest.yml after
          changes to the cobra CLI source. Source commit: ${GITHUB_SHA::7}."
          git push origin HEAD:${GITHUB_REF#refs/heads/}
          echo '::notice::Digest committed.'
